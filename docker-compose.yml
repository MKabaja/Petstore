services:
    app:
        build:
            context: .
            dockerfile: ./docker/php/Dockerfile
        container_name: petstore_app
        restart: unless-stopped

        working_dir: /var/www
        volumes:
            - .:/var/www
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
        networks:
            - petstore_network

    nginx:
        image: nginx:alpine
        container_name: petstore_nginx
        restart: unless-stopped
        ports:
            - "8000:80"
        depends_on:
            - app
        volumes:
            - .:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - petstore_network

networks:
    petstore_network:
        driver: bridge
